name: CashClone
options:
  bundleIdPrefix: com.skibidi
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  CashClone:
    type: application
    platform: iOS
    sources:
      - path: Sources/CashClone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skibidi.cashclone
        INFOPLIST_KEY_CFBundleDisplayName: Cash
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
